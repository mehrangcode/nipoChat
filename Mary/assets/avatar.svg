<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420" role="img" aria-label="Portrait placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFE3EF"/>
      <stop offset="1" stop-color="#FFC2DD"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6E4B5E"/>
      <stop offset="1" stop-color="#5A3D4E"/>
    </linearGradient>
  </defs>
  <rect width="420" height="420" rx="48" fill="url(#bg)"/>
  <g>
    <!-- hair back -->
    <path d="M110 210c0-72 40-120 100-120s100 48 100 120c0 50-14 86-40 104H150c-26-18-40-54-40-104z" fill="url(#hair)"/>
    <!-- face -->
    <circle cx="210" cy="200" r="78" fill="#FFE9DA"/>
    <!-- blush -->
    <circle cx="172" cy="216" r="13" fill="#FF9EC4" opacity=".55"/>
    <circle cx="248" cy="216" r="13" fill="#FF9EC4" opacity=".55"/>
    <!-- eyes -->
    <circle cx="184" cy="192" r="7" fill="#5A3D4E"/>
    <circle cx="236" cy="192" r="7" fill="#5A3D4E"/>
    <!-- smile -->
    <path d="M190 224q20 20 40 0" fill="none" stroke="#5A3D4E" stroke-width="5" stroke-linecap="round"/>
    <!-- hair front / bangs -->
    <path d="M132 196c4-66 44-106 78-106s74 40 78 106c-18-30-44-44-78-44s-60 14-78 44z" fill="url(#hair)"/>
    <!-- little flower -->
    <g transform="translate(286,150)">
      <circle r="11" fill="#FF7AA8"/><circle cx="0" cy="-16" r="9" fill="#FFB3D1"/>
      <circle cx="15" cy="-6" r="9" fill="#FFB3D1"/><circle cx="9" cy="13" r="9" fill="#FFB3D1"/>
      <circle cx="-9" cy="13" r="9" fill="#FFB3D1"/><circle cx="-15" cy="-6" r="9" fill="#FFB3D1"/>
    </g>
  </g>
</svg>
